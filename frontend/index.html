<!DOCTYPE html>
<html>
<head>
    <title>Credit Risk Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            width: 400px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #3b82f6;
            border: none;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .excellent { color: #22c55e; }
        .good { color: #3b82f6; }
        .risky { color: #facc15; }
        .default { color: #ef4444; }
    </style>
</head>
<body>

<div class="box">
    <h2>📊 Credit Risk Predictor</h2>

    <input type="file" id="fileInput" />
    <br>
    <button onclick="upload()">Analyze</button>

    <div class="result" id="result"></div>
</div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://credit-risk-backend-7e5e.onrender.com/analyze", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <h3>Current State: <span class="${data.current_state.toLowerCase()}">${data.current_state}</span></h3>
        <h4>Prediction:</h4>
        <pre>${JSON.stringify(data.prediction, null, 2)}</pre>
    `;
}
</script>

</body>
</html>
